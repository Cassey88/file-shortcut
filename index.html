<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#10141F">
<title>File Shortcut</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --ink:#10141F; --panel:#181E2C; --line:#242C3E;
    --amber:#FFB454; --amber-press:#E89A33;
    --text:#F2F4F8; --muted:#8A93A6;
  }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%}
  body{
    background:var(--ink); color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:max(20px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));
  }
  header{width:100%; max-width:420px; display:flex; align-items:baseline; justify-content:space-between; padding:8px 4px 0}
  header h1{font-size:15px; font-weight:600; letter-spacing:.4px}
  header .dot{color:var(--amber)}
  #installBtn{
    background:none; border:1px solid var(--line); color:var(--muted);
    font-size:12px; padding:6px 12px; border-radius:999px; display:none; cursor:pointer;
  }
  main{flex:1; width:100%; max-width:420px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px}

  /* Signature: the launcher button */
  #launch{
    width:min(64vw,240px); aspect-ratio:1; border-radius:50%;
    background:var(--amber); border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    color:#1A1204; box-shadow:0 0 0 10px rgba(255,180,84,.08), 0 0 0 22px rgba(255,180,84,.04);
    transition:transform .08s ease, background .08s ease;
    -webkit-tap-highlight-color:transparent;
  }
  #launch:active{transform:scale(.96); background:var(--amber-press)}
  #launch:focus-visible{outline:3px solid var(--text); outline-offset:4px}
  #launch .ext{
    font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; font-weight:700;
    background:#1A1204; color:var(--amber); padding:3px 10px; border-radius:6px; letter-spacing:1px;
  }
  #launch .action{font-size:19px; font-weight:700}
  #launch .hint{font-size:12px; opacity:.75}

  #fileCard{
    width:100%; background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; display:none; align-items:center; gap:12px;
  }
  #fileCard .meta{min-width:0; flex:1}
  #fileName{
    font-family:ui-monospace,Menlo,Consolas,monospace; font-size:14px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #fileInfo{font-size:12px; color:var(--muted); margin-top:3px}
  #changeBtn{
    background:none; border:1px solid var(--line); color:var(--muted);
    font-size:12px; padding:7px 12px; border-radius:8px; cursor:pointer; flex-shrink:0;
  }
  .row{width:100%; display:none; gap:10px}
  .row button{
    flex:1; background:var(--panel); border:1px solid var(--line); color:var(--text);
    font-size:14px; padding:13px; border-radius:12px; cursor:pointer;
  }
  #autoRow{width:100%; display:none; align-items:center; justify-content:space-between;
    padding:4px 6px; font-size:13px; color:var(--muted)}
  .nameRow{width:100%; display:none; flex-direction:column; gap:8px; font-size:13px; color:var(--muted); padding:0 2px}
  .nameControls{display:flex; gap:10px}
  .nameControls input{
    flex:1; background:var(--panel); border:1px solid var(--line); color:var(--text);
    font-size:14px; padding:11px 12px; border-radius:10px; min-width:0;
  }
  .nameControls input:focus{outline:2px solid var(--amber); outline-offset:-1px}
  .nameControls button{
    background:var(--panel); border:1px solid var(--line); color:var(--text);
    font-size:14px; padding:11px 18px; border-radius:10px; cursor:pointer;
  }
  #autoRow input{width:20px; height:20px; accent-color:var(--amber)}
  #status{min-height:20px; font-size:13px; color:var(--muted); text-align:center; padding:0 10px}
  #status.err{color:#FF8080}
  footer{font-size:11px; color:var(--muted); text-align:center; max-width:420px; padding-top:12px; line-height:1.5}
  @media (prefers-reduced-motion:reduce){ #launch{transition:none} }
</style>
</head>
<body>
<header>
  <h1>File Shortcut<span class="dot">.</span></h1>
  <button id="installBtn">Add to home screen</button>
</header>

<main>
  <button id="launch" aria-label="Open file">
    <span class="ext" id="extBadge">FILE</span>
    <span class="action" id="launchLabel">Choose a file</span>
    <span class="hint" id="launchHint">picked once, remembered</span>
  </button>

  <div id="fileCard">
    <div class="meta">
      <div id="fileName"></div>
      <div id="fileInfo"></div>
    </div>
    <button id="changeBtn">Change</button>
  </div>

  <div class="row" id="actionRow">
    <button id="openInBtn">Open in Chrome</button>
    <button id="shareBtn">Send to app…</button>
  </div>

  <div class="nameRow" id="nameRow">
    <label for="appName">Home screen name</label>
    <div class="nameControls">
      <input type="text" id="appName" maxlength="30" placeholder="File Shortcut">
      <button id="saveNameBtn">Save</button>
    </div>
  </div>

  <div id="autoRow">
    <label for="autoOpen">Open instantly when app launches</label>
    <input type="checkbox" id="autoOpen">
  </div>

  <div id="status" role="status"></div>
</main>

<footer>
  Your file never leaves this device. Android asks a one-tap
  “allow access” the first time after each restart — that’s the OS, not the app.
</footer>

<input type="file" id="fallbackPicker" hidden>

<script>
const $ = id => document.getElementById(id);
const DB='fileShortcut', STORE='kv';
let handle=null, storedFile=null, deferredPrompt=null;

// ---------- IndexedDB ----------
function idb(){ return new Promise((res,rej)=>{
  const r=indexedDB.open(DB,1);
  r.onupgradeneeded=()=>r.result.createObjectStore(STORE);
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
});}
async function kvSet(k,v){ const d=await idb(); return new Promise((res,rej)=>{
  const t=d.transaction(STORE,'readwrite'); t.objectStore(STORE).put(v,k);
  t.oncomplete=res; t.onerror=()=>rej(t.error);
});}
async function kvGet(k){ const d=await idb(); return new Promise((res,rej)=>{
  const q=d.transaction(STORE).objectStore(STORE).get(k);
  q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error);
});}

// ---------- helpers ----------
const VIEWABLE=/^(application\/pdf|image\/|text\/|video\/|audio\/)/;
function ext(name){ const m=name.match(/\.([a-z0-9]+)$/i); return m?m[1].toUpperCase():'FILE'; }
function fmtSize(b){ if(b==null)return''; const u=['B','KB','MB','GB']; let i=0;
  while(b>=1024&&i<3){b/=1024;i++} return b.toFixed(i?1:0)+' '+u[i]; }
function setStatus(msg,err){ $('status').textContent=msg||''; $('status').className=err?'err':''; }

function showFileUI(name,size){
  $('extBadge').textContent=ext(name);
  $('launchLabel').textContent='Open';
  $('launchHint').textContent='tap to launch';
  $('fileName').textContent=name;
  $('fileInfo').textContent=(size!=null?fmtSize(size)+' · ':'')+(handle?'linked to original file':'stored copy');
  $('fileCard').style.display='flex';
  $('actionRow').style.display='flex';
  $('autoRow').style.display='flex';
  $('nameRow').style.display='flex';
}

// ---------- picking ----------
async function pickFile(){
  try{
    if(window.showOpenFilePicker){
      const [h]=await window.showOpenFilePicker();
      handle=h; storedFile=null;
      await kvSet('handle',h); await kvSet('copy',null);
      const f=await h.getFile();
      showFileUI(f.name,f.size); await setDefaultName(f.name); setStatus('Remembered. Next launch is one tap.');
    }else{
      $('fallbackPicker').click();
    }
  }catch(e){ if(e.name!=='AbortError') setStatus('Could not pick file: '+e.message,true); }
}
$('fallbackPicker').addEventListener('change',async e=>{
  const f=e.target.files[0]; if(!f)return;
  storedFile=f; handle=null;
  await kvSet('copy',f); await kvSet('handle',null);
  showFileUI(f.name,f.size);
  await setDefaultName(f.name);
  setStatus('This browser can’t link the original, so a copy is stored. Re-pick after the file changes.');
});

// ---------- getting the File ----------
async function getFile(){
  if(handle){
    let p=await handle.queryPermission({mode:'read'});
    if(p!=='granted') p=await handle.requestPermission({mode:'read'});
    if(p!=='granted') throw new Error('Access not allowed');
    return handle.getFile();
  }
  if(storedFile) return storedFile;
  return null;
}

// ---------- opening ----------
async function openFile(mode){ // mode: 'auto' | 'view' | 'share'
  try{
    const f=await getFile();
    if(!f){ pickFile(); return; }
    if(mode==='share' || (mode==='auto' && !VIEWABLE.test(f.type))){
      if(navigator.canShare && navigator.canShare({files:[f]})){
        await navigator.share({files:[f],title:f.name});
        return;
      }
      mode='view'; // fall through
    }
    const url=URL.createObjectURL(f);
    const w=window.open(url,'_blank');
    if(!w) location.assign(url);
    setStatus('');
  }catch(e){
    if(e.name!=='AbortError') setStatus(e.message,true);
  }
}

$('launch').addEventListener('click',()=>openFile('auto'));
$('openInBtn').addEventListener('click',()=>openFile('view'));
$('shareBtn').addEventListener('click',()=>openFile('share'));
$('changeBtn').addEventListener('click',pickFile);

// ---------- shortcut name ----------
async function setDefaultName(fileName){
  const existing=await kvGet('appName');
  if(existing){ $('appName').value=existing; return; }
  const base=fileName.replace(/\.[a-z0-9]+$/i,'');
  $('appName').value=base;
  await kvSet('appName',base);
  document.title=base;
}
$('saveNameBtn').addEventListener('click',async()=>{
  const v=$('appName').value.trim()||'File Shortcut';
  await kvSet('appName',v);
  document.title=v;
  setStatus('Name saved. Remove the old home screen icon, then Add to home screen again to apply it.');
});

// ---------- auto-open ----------
$('autoOpen').addEventListener('change',e=>{
  localStorage.setItem('autoOpen',e.target.checked?'1':'');
  setStatus(e.target.checked
    ?'Will open the file automatically when access is already granted.'
    :'');
});

// ---------- install prompt ----------
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e; $('installBtn').style.display='block';
});
$('installBtn').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice;
  deferredPrompt=null; $('installBtn').style.display='none';
});

// ---------- boot ----------
(async function init(){
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  try{
    handle=await kvGet('handle')||null;
    storedFile=await kvGet('copy')||null;
    if(handle){
      const p=await handle.queryPermission({mode:'read'});
      let name='(saved file)',size=null;
      if(p==='granted'){ const f=await handle.getFile(); name=f.name; size=f.size; }
      else if(handle.name) name=handle.name;
      showFileUI(name,size);
      if(p==='granted' && localStorage.getItem('autoOpen')){
        const f=await handle.getFile();
        if(VIEWABLE.test(f.type)) location.assign(URL.createObjectURL(f));
      }
    }else if(storedFile){
      showFileUI(storedFile.name,storedFile.size);
      if(localStorage.getItem('autoOpen') && VIEWABLE.test(storedFile.type))
        location.assign(URL.createObjectURL(storedFile));
    }
    $('autoOpen').checked=!!localStorage.getItem('autoOpen');
    const savedName=await kvGet('appName');
    if(savedName){ $('appName').value=savedName; document.title=savedName; }
  }catch(e){ setStatus('Could not restore saved file — choose it again.',true); }
})();
</script>
</body>
</html>
