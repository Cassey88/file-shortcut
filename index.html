<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#10141F">
<title>File Shortcut</title>
<link rel="manifest" href="manifest.json" id="manifestLink">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --ink:#10141F; --panel:#181E2C; --line:#242C3E;
    --amber:#FFB454; --amber-press:#E89A33;
    --text:#F2F4F8; --muted:#8A93A6;
  }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%}
  body{
    background:var(--ink); color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:max(20px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));
  }
  header{width:100%; max-width:420px; display:flex; align-items:center; justify-content:space-between; padding:8px 4px 0; gap:10px}
  header h1{font-size:15px; font-weight:600; letter-spacing:.4px}
  header .dot{color:var(--amber)}
  header .slotTag{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px; color:var(--muted);
    border:1px solid var(--line); padding:3px 8px; border-radius:999px}
  .pillBtn{
    background:none; border:1px solid var(--line); color:var(--muted);
    font-size:12px; padding:6px 12px; border-radius:999px; cursor:pointer; white-space:nowrap;
  }
  main{flex:1; width:100%; max-width:420px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; padding:16px 0}

  #launch{
    width:min(58vw,220px); aspect-ratio:1; border-radius:50%;
    background:var(--amber); border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    color:#1A1204; box-shadow:0 0 0 10px rgba(255,180,84,.08), 0 0 0 22px rgba(255,180,84,.04);
    transition:transform .08s ease, background .08s ease;
    -webkit-tap-highlight-color:transparent;
  }
  #launch:active{transform:scale(.96); background:var(--amber-press)}
  #launch:focus-visible{outline:3px solid var(--text); outline-offset:4px}
  #launch .ext{
    font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; font-weight:700;
    background:#1A1204; color:var(--amber); padding:3px 10px; border-radius:6px; letter-spacing:1px;
  }
  #launch .action{font-size:19px; font-weight:700}
  #launch .hint{font-size:12px; opacity:.75}

  #fileCard{
    width:100%; background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; display:none; align-items:center; gap:12px;
  }
  #fileCard .meta{min-width:0; flex:1}
  #fileName{
    font-family:ui-monospace,Menlo,Consolas,monospace; font-size:14px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #fileInfo{font-size:12px; color:var(--muted); margin-top:3px}
  #changeBtn{
    background:none; border:1px solid var(--line); color:var(--muted);
    font-size:12px; padding:7px 12px; border-radius:8px; cursor:pointer; flex-shrink:0;
  }
  .row{width:100%; display:none; gap:10px}
  .row button{
    flex:1; background:var(--panel); border:1px solid var(--line); color:var(--text);
    font-size:14px; padding:13px; border-radius:12px; cursor:pointer;
  }
  .nameRow{width:100%; display:none; flex-direction:column; gap:8px; font-size:13px; color:var(--muted); padding:0 2px}
  .nameControls{display:flex; gap:10px}
  .nameControls input{
    flex:1; background:var(--panel); border:1px solid var(--line); color:var(--text);
    font-size:14px; padding:11px 12px; border-radius:10px; min-width:0;
  }
  .nameControls input:focus{outline:2px solid var(--amber); outline-offset:-1px}
  .nameControls button{
    background:var(--panel); border:1px solid var(--line); color:var(--text);
    font-size:14px; padding:11px 18px; border-radius:10px; cursor:pointer;
  }
  .toggleRow{width:100%; display:none; align-items:center; justify-content:space-between;
    gap:12px; padding:4px 6px; font-size:13px; color:var(--muted)}
  .toggleRow input{width:20px; height:20px; accent-color:var(--amber); flex-shrink:0}

  #shortcutList{width:100%; display:none; flex-direction:column; gap:8px; padding-top:4px}
  #shortcutList h2{font-size:12px; font-weight:600; color:var(--muted); letter-spacing:.5px; text-transform:uppercase}
  .slotItem{
    display:flex; align-items:center; gap:10px; background:var(--panel);
    border:1px solid var(--line); border-radius:10px; padding:10px 14px;
    color:var(--text); text-decoration:none; font-size:14px;
  }
  .slotItem .num{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px; color:var(--amber); flex-shrink:0}
  .slotItem .nm{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .slotItem .cur{font-size:11px; color:var(--muted)}
  #status{min-height:20px; font-size:13px; color:var(--muted); text-align:center; padding:0 10px}
  #status.err{color:#FF8080}
  footer{font-size:11px; color:var(--muted); text-align:center; max-width:420px; padding-top:12px; line-height:1.5}
  @media (prefers-reduced-motion:reduce){ #launch{transition:none} }
</style>
</head>
<body>
<header>
  <h1>File Shortcut<span class="dot">.</span></h1>
  <span class="slotTag" id="slotTag"></span>
  <button class="pillBtn" id="newSlotBtn">+ New shortcut</button>
  <button class="pillBtn" id="installBtn">Add to home screen</button>
</header>

<main>
  <button id="launch" aria-label="Open file">
    <span class="ext" id="extBadge">FILE</span>
    <span class="action" id="launchLabel">Choose a file</span>
    <span class="hint" id="launchHint">picked once, remembered</span>
  </button>

  <div id="fileCard">
    <div class="meta">
      <div id="fileName"></div>
      <div id="fileInfo"></div>
    </div>
    <button id="changeBtn">Change</button>
  </div>

  <div class="row" id="actionRow">
    <button id="openInBtn">Open in Chrome</button>
    <button id="shareBtn">Send to app…</button>
  </div>

  <div class="nameRow" id="nameRow">
    <label for="appName">Home screen name for this shortcut</label>
    <div class="nameControls">
      <input type="text" id="appName" maxlength="30" placeholder="File Shortcut">
      <button id="saveNameBtn">Save</button>
    </div>
  </div>

  <div class="toggleRow" id="autoRow">
    <label for="autoOpen">Open instantly when app launches</label>
    <input type="checkbox" id="autoOpen">
  </div>

  <div class="toggleRow" id="noPromptRow">
    <label for="noPrompt">Never ask for permission (use a saved copy)</label>
    <input type="checkbox" id="noPrompt">
  </div>

  <div id="shortcutList">
    <h2>Your shortcuts</h2>
  </div>

  <div id="status" role="status"></div>
</main>

<footer>
  Each shortcut is its own home screen icon with its own file and name.
  Your files never leave this device.
</footer>

<input type="file" id="fallbackPicker" hidden>

<script>
const $ = id => document.getElementById(id);
const DB='fileShortcut', STORE='kv', MAX_SLOTS=20;

// ---------- slot ----------
const _params = new URLSearchParams(location.search);
const slot = (_params.get('slot')||'1').replace(/[^0-9]/g,'')||'1';
const stayHere = !!_params.get('stay'); // ?stay=1 always shows this page, never auto-opens
// slot 1 keeps the original un-prefixed keys so existing setups keep working
const k = n => slot==='1' ? n : 's'+slot+':'+n;
$('slotTag').textContent = 'shortcut #'+slot;
$('manifestLink').href = 'manifest.json?slot='+slot;

let handle=null, storedFile=null, deferredPrompt=null;

// ---------- IndexedDB ----------
function idb(){ return new Promise((res,rej)=>{
  const r=indexedDB.open(DB,1);
  r.onupgradeneeded=()=>r.result.createObjectStore(STORE);
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
});}
async function kvSet(key,v){ const d=await idb(); return new Promise((res,rej)=>{
  const t=d.transaction(STORE,'readwrite'); t.objectStore(STORE).put(v,key);
  t.oncomplete=res; t.onerror=()=>rej(t.error);
});}
async function kvGet(key){ const d=await idb(); return new Promise((res,rej)=>{
  const q=d.transaction(STORE).objectStore(STORE).get(key);
  q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error);
});}

// ---------- helpers ----------
const VIEWABLE=/^(application\/pdf|image\/|text\/|video\/|audio\/)/;
function ext(name){ const m=name.match(/\.([a-z0-9]+)$/i); return m?m[1].toUpperCase():'FILE'; }
function fmtSize(b){ if(b==null)return''; const u=['B','KB','MB','GB']; let i=0;
  while(b>=1024&&i<3){b/=1024;i++} return b.toFixed(i?1:0)+' '+u[i]; }
function setStatus(msg,err){ $('status').textContent=msg||''; $('status').className=err?'err':''; }

function showFileUI(name,size){
  $('extBadge').textContent=ext(name);
  $('launchLabel').textContent='Open';
  $('launchHint').textContent='tap to launch';
  $('fileName').textContent=name;
  const mode=(localStorage.getItem(k('noPrompt'))&&storedFile)?'saved copy — never asks'
            :(handle?'linked to original file':'stored copy');
  $('fileInfo').textContent=(size!=null?fmtSize(size)+' · ':'')+mode;
  $('fileCard').style.display='flex';
  $('actionRow').style.display='flex';
  $('autoRow').style.display='flex';
  $('noPromptRow').style.display='flex';
  $('nameRow').style.display='flex';
}

// ---------- picking ----------
async function pickFile(){
  try{
    if(window.showOpenFilePicker){
      const [h]=await window.showOpenFilePicker();
      handle=h; storedFile=null;
      await kvSet(k('handle'),h); await kvSet(k('copy'),null);
      localStorage.removeItem(k('noPrompt')); $('noPrompt').checked=false;
      const f=await h.getFile();
      showFileUI(f.name,f.size); await setDefaultName(f.name);
      setStatus('Remembered. Next launch is one tap.');
      renderSlots();
    }else{
      $('fallbackPicker').click();
    }
  }catch(e){ if(e.name!=='AbortError') setStatus('Could not pick file: '+e.message,true); }
}
$('fallbackPicker').addEventListener('change',async e=>{
  const f=e.target.files[0]; if(!f)return;
  storedFile=f; handle=null;
  await kvSet(k('copy'),f); await kvSet(k('handle'),null);
  showFileUI(f.name,f.size); await setDefaultName(f.name);
  setStatus('This browser can’t link the original, so a copy is stored. Re-pick after the file changes.');
  renderSlots();
});

// ---------- getting the File ----------
async function readFromHandle(){
  if(!handle) return null;
  let p=await handle.queryPermission({mode:'read'});
  if(p!=='granted') p=await handle.requestPermission({mode:'read'});
  if(p!=='granted') throw new Error('Access not allowed');
  return handle.getFile();
}
async function getFile(){
  if(localStorage.getItem(k('noPrompt')) && storedFile) return storedFile;
  if(handle) return readFromHandle();
  if(storedFile) return storedFile;
  return null;
}

// ---------- opening ----------
async function openFile(mode){ // 'auto' | 'view' | 'share'
  try{
    const f=await getFile();
    if(!f){ pickFile(); return; }
    if(mode==='share' || (mode==='auto' && !VIEWABLE.test(f.type))){
      if(navigator.canShare && navigator.canShare({files:[f]})){
        await navigator.share({files:[f],title:f.name});
        return;
      }
      mode='view';
    }
    sessionStorage.setItem('fs-opened-'+slot,'1');
    await kvSet('fileserve:'+slot,f);
    const url='file?slot='+slot;
    const w=window.open(url,'_blank');
    if(!w) location.assign(url);
    setStatus('');
  }catch(e){
    if(e.name!=='AbortError') setStatus(e.message,true);
  }
}
$('launch').addEventListener('click',()=>openFile('auto'));
$('openInBtn').addEventListener('click',()=>openFile('view'));
$('shareBtn').addEventListener('click',()=>openFile('share'));
$('changeBtn').addEventListener('click',pickFile);

// ---------- shortcut name ----------
async function setDefaultName(fileName){
  const existing=await kvGet(k('appName'));
  if(existing){ $('appName').value=existing; return; }
  const base=fileName.replace(/\.[a-z0-9]+$/i,'');
  $('appName').value=base;
  await kvSet(k('appName'),base);
  document.title=base;
}
$('saveNameBtn').addEventListener('click',async()=>{
  const v=$('appName').value.trim()||('File Shortcut '+slot);
  await kvSet(k('appName'),v);
  document.title=v;
  renderSlots();
  setStatus('Name saved. Now use “Add to home screen” — the icon will be called “'+v+'”.');
});

// ---------- no-prompt mode ----------
$('noPrompt').addEventListener('change',async e=>{
  if(e.target.checked){
    try{
      const f=handle?await readFromHandle():storedFile;
      if(!f){ setStatus('Pick a file first.',true); e.target.checked=false; return; }
      storedFile=f; await kvSet(k('copy'),f);
      localStorage.setItem(k('noPrompt'),'1');
      showFileUI(f.name,f.size);
      setStatus('Copy saved — no more permission prompts. If the file changes, untick and re-tick this to refresh the copy.');
    }catch(err){
      e.target.checked=false;
      if(err.name!=='AbortError') setStatus(err.message,true);
    }
  }else{
    localStorage.removeItem(k('noPrompt'));
    if(handle) showFileUI($('fileName').textContent, null);
    setStatus('Back to opening the original file (Chrome will ask again).');
  }
});

// ---------- auto-open ----------
$('autoOpen').addEventListener('change',e=>{
  localStorage.setItem(k('autoOpen'),e.target.checked?'1':'');
  setStatus(e.target.checked?'Will open the file automatically when no permission prompt is needed.':'');
});

// ---------- multi-shortcut ----------
async function slotInfo(n){
  const key = n===1 ? (x=>x) : (x=>'s'+n+':'+x);
  const h=await kvGet(key('handle')), c=await kvGet(key('copy'));
  if(!h && !c) return null;
  const name=await kvGet(key('appName'));
  return { n, name: name || (h&&h.name) || (c&&c.name) || ('Shortcut '+n) };
}
async function renderSlots(){
  const list=$('shortcutList');
  [...list.querySelectorAll('.slotItem')].forEach(el=>el.remove());
  let count=0;
  for(let n=1;n<=MAX_SLOTS;n++){
    const info=await slotInfo(n);
    if(!info) continue;
    count++;
    const a=document.createElement('a');
    a.className='slotItem';
    a.href='index.html?slot='+n;
    a.innerHTML='<span class="num">#'+n+'</span><span class="nm"></span>'+
      (String(n)===slot?'<span class="cur">(this one)</span>':'');
    a.querySelector('.nm').textContent=info.name;
    list.appendChild(a);
  }
  list.style.display = count>1 ? 'flex' : 'none';
}
$('newSlotBtn').addEventListener('click',async()=>{
  for(let n=1;n<=MAX_SLOTS;n++){
    if(!(await slotInfo(n))){ location.assign('index.html?slot='+n); return; }
  }
  setStatus('All '+MAX_SLOTS+' shortcut slots are in use.',true);
});

// ---------- install prompt ----------
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
});
window.addEventListener('appinstalled',()=>{
  setStatus('Added! Check your home screen.');
});
$('installBtn').addEventListener('click',async()=>{
  if(deferredPrompt){
    const p=deferredPrompt; deferredPrompt=null;
    p.prompt(); await p.userChoice;
  }else{
    setStatus('Chrome isn\u2019t offering the install dialog right now (often because this shortcut is already installed). Use Chrome\u2019s \u22ee menu \u2192 \u201cAdd to Home screen\u201d or \u201cInstall and create shortcut\u201d instead.');
  }
});

// ---------- boot ----------
(async function init(){
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  try{
    handle=await kvGet(k('handle'))||null;
    storedFile=await kvGet(k('copy'))||null;
    const savedName=await kvGet(k('appName'));
    if(savedName){ $('appName').value=savedName; document.title=savedName; }
    $('autoOpen').checked=!!localStorage.getItem(k('autoOpen'));
    $('noPrompt').checked=!!localStorage.getItem(k('noPrompt'));

    const freshLaunch = !stayHere && !sessionStorage.getItem('fs-opened-'+slot);
    if(localStorage.getItem(k('noPrompt')) && storedFile){
      showFileUI(storedFile.name,storedFile.size);
      if(freshLaunch && localStorage.getItem(k('autoOpen')) && VIEWABLE.test(storedFile.type)){
        sessionStorage.setItem('fs-opened-'+slot,'1');
        await kvSet('fileserve:'+slot,storedFile);
        location.assign('file?slot='+slot);
      }
    }else if(handle){
      const p=await handle.queryPermission({mode:'read'});
      let name='(saved file)',size=null;
      if(p==='granted'){ const f=await handle.getFile(); name=f.name; size=f.size; }
      else if(handle.name) name=handle.name;
      showFileUI(name,size);
      if(freshLaunch && p==='granted' && localStorage.getItem(k('autoOpen'))){
        const f=await handle.getFile();
        if(VIEWABLE.test(f.type)){
          sessionStorage.setItem('fs-opened-'+slot,'1');
          await kvSet('fileserve:'+slot,f);
          location.assign('file?slot='+slot);
        }
      }
    }else if(storedFile){
      showFileUI(storedFile.name,storedFile.size);
      if(freshLaunch && localStorage.getItem(k('autoOpen')) && VIEWABLE.test(storedFile.type)){
        sessionStorage.setItem('fs-opened-'+slot,'1');
        await kvSet('fileserve:'+slot,storedFile);
        location.assign('file?slot='+slot);
      }
    }
    renderSlots();
  }catch(e){ setStatus('Could not restore saved file — choose it again.',true); }
})();
</script>
</body>
</html>
